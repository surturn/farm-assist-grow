version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: farmassist
      POSTGRES_PASSWORD: farmassist
      POSTGRES_DB: farmassist
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
